name: front_appsnack
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.7.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  wave: ^0.2.2
  share_plus: ^10.1.0
  path_provider: ^2.1.5
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/imagenes/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/imagenes/app_icon.png"
  adaptive_icon_foreground_inset: 0

flutter:
  uses-material-design: true
  
  assets:
    - assets/imagenes/

